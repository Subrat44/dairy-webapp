---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dairyhub-backend
  namespace: dairyhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dairyhub-backend
  template:
    metadata:
      labels:
        app: dairyhub-backend
    spec:
      containers:
        - name: backend
          image: subrat44/dairyhub-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URL
              value: "mongodb://mongo-svc:27017"
            - name: DB_NAME
              value: "dairyhub"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dairyhub-secrets
                  key: SECRET_KEY
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dairyhub-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: dairyhub-secrets
                  key: RAZORPAY_KEY_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: dairyhub-backend-svc
  namespace: dairyhub
spec:
  selector:
    app: dairyhub-backend
  ports:
    - port: 8000
      targetPort: 8000

---
# MongoDB StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: dairyhub
spec:
  selector:
    matchLabels:
      app: mongo
  serviceName: mongo-svc
  replicas: 1
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-svc
  namespace: dairyhub
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None